<!DOCTYPE html>
<html>
<head>
    <title>Tic Tac Toe AI</title>

    <style>
        body {
            height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial;
        }

        h1 { color: white; }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 110px);
            gap: 10px;
            margin: 20px;
        }

        .cell {
            width: 110px;
            height: 110px;
            background: #1e90ff;
            color: white;
            font-size: 40px;
            font-weight: bold;
            border-radius: 12px;

            display: flex;
            align-items: center;
            justify-content: center;

            cursor: pointer;
            transition: 0.3s;
        }

        .cell:hover {
            background: #187bcd;
            transform: scale(1.08);
        }

        select, button {
            padding: 8px;
            margin: 5px;
            border-radius: 8px;
            border: none;
        }

        button {
            background: #00c6ff;
            color: white;
            cursor: pointer;
        }

        #result, #time {
            color: white;
        }
    </style>
</head>

<body>

<h1>🎮 Tic Tac Toe AI</h1>

<select id="method">
    <option value="minimax">Minimax</option>
    <option value="alpha">Alpha-Beta</option>
</select>

<div class="grid" id="grid"></div>

<h2 id="result"></h2>
<p id="time"></p>

<button onclick="reset()">Reset</button>

<script>
let board = Array(9).fill(" ");
let gameOver = false;

function draw() {
    let grid = document.getElementById("grid");
    grid.innerHTML = "";

    board.forEach((val, i) => {
        let cell = document.createElement("div");
        cell.className = "cell";

        cell.innerText = val === " " ? "" : val;

        if (!gameOver && val === " ") {
            cell.onclick = () => play(i);
        }

        grid.appendChild(cell);
    });
}

function play(i) {
    if (gameOver || board[i] !== " ") return;

    fetch("/move", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            pos:i,
            method:document.getElementById("method").value
        })
    })
    .then(res=>res.json())
    .then(data=>{
        board = data.board;
        draw();

        if (data.time) {
            document.getElementById("time").innerText =
                "Execution Time: " + data.time + " sec";
        }

        if (data.winner) {
            gameOver = true;

            let msg = "";
            if (data.winner === "X") msg = "🎉 You Win!";
            else if (data.winner === "O") msg = "🤖 AI Wins!";
            else msg = "🤝 Draw!";

            document.getElementById("result").innerText = msg;
        }
    });
}

function reset() {
    fetch("/reset")
    .then(res=>res.json())
    .then(data=>{
        board = data.board;
        gameOver = false;
        document.getElementById("result").innerText = "";
        document.getElementById("time").innerText = "";
        draw();
    });
}

draw();
</script>

</body>
</html>
